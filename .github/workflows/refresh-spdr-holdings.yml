name: Refresh SPDR holdings

on:
  schedule:
    - cron: "30 23 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install openpyxl
      - run: python scripts/refresh_spdr_holdings.py
      - name: Commit validated changes
        run: |
          git config user.name "rotation-data-bot"
          git config user.email "rotation-data-bot@users.noreply.github.com"
          git add app/generated/spdr-holdings.json
          git diff --cached --quiet || git commit -m "Refresh SPDR holdings"
          git push
